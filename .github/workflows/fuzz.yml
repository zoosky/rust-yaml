name: Fuzz

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "fuzz/**"
      - ".github/workflows/fuzz.yml"
  schedule:
    # Nightly at 03:17 UTC.
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      duration:
        description: "Seconds to run each fuzz target"
        required: false
        default: "300"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Fast compile check on every PR that touches the harness or the library —
  # keeps the targets buildable without spending any fuzzing budget.
  build:
    name: Build fuzz targets
    if: github.event_name == 'pull_request'
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Build all fuzz targets
        run: cargo +nightly fuzz build

  # Scheduled / manual fuzzing run. load_str and load_str_strict are gating;
  # roundtrip is non-blocking until #66 (numeric mapping key) is fixed.
  fuzz:
    name: Run fuzz targets
    if: github.event_name != 'pull_request'
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    timeout-minutes: 40
    env:
      # Captured into an env var here (the safe pattern); steps reference the
      # shell variable $FUZZ_SECONDS, never `${{ }}` interpolation in `run:`.
      FUZZ_SECONDS: ${{ github.event.inputs.duration || '300' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz load_str
        run: cargo +nightly fuzz run load_str -- -max_total_time="$FUZZ_SECONDS"

      - name: Fuzz load_str_strict
        run: cargo +nightly fuzz run load_str_strict -- -max_total_time="$FUZZ_SECONDS"

      - name: Fuzz roundtrip (non-blocking — tracks #66)
        continue-on-error: true
        run: cargo +nightly fuzz run roundtrip -- -max_total_time="$FUZZ_SECONDS"

      - name: Upload crash artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
          if-no-files-found: ignore
          retention-days: 14
