name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "benches/**"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "benches/**"

permissions:
  contents: write
  id-token: write
  pages: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  CARGO_INCREMENTAL: 1
  RUST_BACKTRACE: 1

jobs:
  version:
    name: Version Info
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    timeout-minutes: 6
    outputs:
      informational_version: ${{ steps.gitversion.outputs.InformationalVersion }}
      major_minor_patch: ${{ steps.gitversion.outputs.MajorMinorPatch }}
      sem_version: ${{ steps.gitversion.outputs.SemVer }}
      version: ${{ steps.gitversion.outputs.MajorMinorPatch }}
      major: ${{ steps.gitversion.outputs.Major }}
      minor: ${{ steps.gitversion.outputs.Minor }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CLIENT_ID }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Use PR head SHA on pull_request events to avoid synthetic merge commit
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: "0"
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token || github.token }}
          submodules: true

      - name: GitHub Actions Bot Setup
        uses: ./.github/actions/bot-setup

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: "6.x"

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0
        with:
          configFilePath: GitVersion.yml

      - name: Display version info
        run: |
          echo "Version: ${{ steps.gitversion.outputs.SemVer }}"
          echo "Informational Version: ${{ steps.gitversion.outputs.InformationalVersion }}"
          echo "Branch Name: ${{ steps.gitversion.outputs.BranchName }}"
          echo "SHA: ${{ steps.gitversion.outputs.Sha }}"

  test:
    name: Test Suite (${{ matrix.rust }} - ${{ matrix.os }} / ${{ matrix.arch }})
    needs: version
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]') }}
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta, nightly]
        os: [ubuntu-latest, windows-2025, macos-15]
        arch: [x86_64, aarch64]
        exclude:
          # Exclude combinations that don't exist
          - os: windows-2025
            arch: aarch64
        include:
          # Add rust-target for each valid combination
          - os: ubuntu-latest
            arch: x86_64
            rust-target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            arch: aarch64
            rust-target: aarch64-unknown-linux-gnu
          - os: windows-2025
            arch: x86_64
            rust-target: x86_64-pc-windows-msvc
          - os: macos-15
            arch: x86_64
            rust-target: x86_64-apple-darwin
          - os: macos-15
            arch: aarch64
            rust-target: aarch64-apple-darwin
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CLIENT_ID }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Use PR head SHA on pull_request events to avoid synthetic merge commit
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: "0"
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token || github.token }}
          submodules: true

      - name: GitHub Actions Bot Setup
        uses: ./.github/actions/bot-setup

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust == 'msrv' || matrix.rust }}
          targets: ${{ matrix.rust-target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'aarch64'
        run: |  # pragma: allowlist secret
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> "$GITHUB_ENV"

      - name: Cache Rust toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
          key: ${{ matrix.os }}-${{ matrix.arch }}-rustup-${{ matrix.rust }}-${{ hashFiles('rust-toolchain.toml', 'rust-toolchain') }}
          restore-keys: |
            ${{ matrix.os }}-${{ matrix.arch }}-rustup-${{ matrix.rust }}-
            ${{ matrix.os }}-rustup-${{ matrix.rust }}-
            ${{ matrix.os }}-rustup-

      - name: Cache cargo registry and git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ matrix.os }}-${{ matrix.arch }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-${{ matrix.arch }}-cargo-registry-
            ${{ matrix.os }}-cargo-registry-

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ matrix.os }}-${{ matrix.arch }}-cargo-build-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('src/**/*.rs') }}
          restore-keys: |
            ${{ matrix.os }}-${{ matrix.arch }}-cargo-build-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}-
            ${{ matrix.os }}-${{ matrix.arch }}-cargo-build-${{ matrix.rust }}-
            ${{ matrix.os }}-cargo-build-${{ matrix.rust }}-
            ${{ matrix.os }}-cargo-build-

      - name: Setup cargo tools cache
        uses: ./.github/actions/setup-cargo-tools
        with:
          tools: "cargo-nextest"

      - name: Run tests with nextest
        if: matrix.arch == 'x86_64' || (matrix.os == 'macos-15' && matrix.arch == 'aarch64') # Run tests on native architectures
        run: cargo nextest run --target ${{ matrix.rust-target }} --verbose

      - name: Run tests with all features
        if: matrix.arch == 'x86_64' || (matrix.os == 'macos-15' && matrix.arch == 'aarch64') # Run tests on native architectures
        run: cargo nextest run --target ${{ matrix.rust-target }} --all-features --verbose

      - name: Run tests without default features
        if: matrix.arch == 'x86_64' || (matrix.os == 'macos-15' && matrix.arch == 'aarch64') # Run tests on native architectures
        run: cargo nextest run --target ${{ matrix.rust-target }} --no-default-features --verbose

      - name: Build tests for cross-compilation targets
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'aarch64' # Only build (not run) for Linux ARM64 cross-compilation
        run: |
          cargo build --target ${{ matrix.rust-target }} --tests --verbose
          cargo build --target ${{ matrix.rust-target }} --tests --all-features --verbose
          cargo build --target ${{ matrix.rust-target }} --tests --no-default-features --verbose

  yaml_test_suite:
    name: YAML Test Suite Conformance
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    timeout-minutes: 15
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]') }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CLIENT_ID }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout repository (with submodules)
        uses: actions/checkout@v6
        with:
          # Use PR head SHA on pull_request events to avoid synthetic merge commit
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: "0"
          fetch-tags: true
          # `yaml-test-suite/data` is a submodule pointing at yaml/yaml-test-suite.
          # Without `recursive`, the harness short-circuits with "Skipping" and we'd
          # publish a green-but-empty report on every run.
          submodules: recursive
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: GitHub Actions Bot Setup
        uses: ./.github/actions/bot-setup

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: ./.github/actions/setup-rust-cache
        with:
          cache-key-suffix: yaml-test-suite

      - name: Run yaml-test-suite conformance harness
        id: conformance
        run: |
          set -o pipefail
          mkdir -p target
          # Mirror `make test-yaml-suite` verbatim. The harness only asserts
          # pass_rate >= 10%, so a non-zero exit is a meaningful regression
          # signal — but we keep going so the report still gets published.
          if timeout 300s cargo test -p yaml-test-suite -- --nocapture 2>&1 \
              | tee target/yaml-test-suite.log; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
          else
            ec=$?
            echo "status=fail" >> "$GITHUB_OUTPUT"
            echo "exit_code=$ec" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Step Summary report
        if: always()
        env:
          CONFORMANCE_STATUS: ${{ steps.conformance.outputs.status }}
          CONFORMANCE_EXIT_CODE: ${{ steps.conformance.outputs.exit_code }}
        run: |
          log=target/yaml-test-suite.log
          {
            echo "# YAML Test Suite Conformance Report"
            echo
            if [ ! -s "$log" ]; then
              echo "> :warning: harness produced no output — see job logs."
              exit 0
            fi
            echo "## Totals"
            echo
            echo '```text'
            # The harness prints a box-drawing summary block; pull it
            # verbatim so the table renders inside the fence.
            sed -n '/╔══*╗/,/╚══*╝/p' "$log"
            echo '```'
            echo
            if grep -q 'Failure breakdown:' "$log"; then
              echo "## Failure breakdown"
              echo
              echo '```text'
              grep -A 4 'Failure breakdown:' "$log"
              echo '```'
              echo
            fi
            echo "## Artifacts"
            echo
            echo "- Full run log: \`yaml-test-suite.log\`"
            echo "- Per-test failure detail: \`yaml-test-suite-failures.txt\`"
            echo
            if [ "$CONFORMANCE_STATUS" != "pass" ]; then
              echo "> :rotating_light: harness exited non-zero (status=$CONFORMANCE_STATUS, code=$CONFORMANCE_EXIT_CODE)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload conformance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: yaml-test-suite-report-${{ github.run_id }}
          path: |
            target/yaml-test-suite.log
            target/yaml-test-suite-failures.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Propagate harness exit code
        if: steps.conformance.outputs.status != 'pass'
        env:
          CONFORMANCE_EXIT_CODE: ${{ steps.conformance.outputs.exit_code }}
        run: |
          echo "::error title=yaml-test-suite regression::harness exited with code ${CONFORMANCE_EXIT_CODE} (pass rate below threshold or panic). See the Step Summary and uploaded artifacts."
          exit 1

  rustfmt:
    name: Format
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    timeout-minutes: 6
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]') }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CLIENT_ID }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Use PR head SHA on pull_request events to avoid synthetic merge commit
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: "0"
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token || github.token }}
          submodules: true

      - name: GitHub Actions Bot Setup
        uses: ./.github/actions/bot-setup

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    timeout-minutes: 6
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]') }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CLIENT_ID }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Use PR head SHA on pull_request events to avoid synthetic merge commit
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: "0"
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token || github.token }}
          submodules: true

      - name: GitHub Actions Bot Setup
        uses: ./.github/actions/bot-setup

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build for clippy
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('src/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-clippy-
            ${{ runner.os }}-cargo-build-stable-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-build-stable-

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  coverage:
    name: Coverage
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    # tarpaulin instruments + recompiles every crate from scratch
    # (cold dep cache, `--cfg=tarpaulin`), then runs lib + tests.
    # On the public Linux runner that's ~4–5 min compile + ~2 min
    # tests, so 6 min was right at the cliff and consistently
    # tripped the kill timeout. 20 min gives comfortable slack.
    timeout-minutes: 20
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]') }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CLIENT_ID }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Use PR head SHA on pull_request events to avoid synthetic merge commit
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: "0"
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token || github.token }}
          submodules: true

      - name: GitHub Actions Bot Setup
        uses: ./.github/actions/bot-setup

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cargo tools cache
        uses: ./.github/actions/setup-cargo-tools
        with:
          tools: "cargo-tarpaulin cargo-llvm-cov"

      - name: Cache cargo registry and git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build for coverage
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('src/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-coverage-
            ${{ runner.os }}-cargo-build-stable-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-build-stable-

      - name: Generate coverage report
        # Switched from `cargo tarpaulin` to `cargo llvm-cov`:
        # tarpaulin's default ptrace engine intermittently failed under
        # the CI runner with `Test failed during run` AFTER every test
        # binary individually reported "ok" — a known ptrace-vs-multi-
        # thread interaction on the public Linux runner. cargo-llvm-cov
        # uses LLVM source-based coverage instrumentation instead, which
        # is process-isolated and doesn't depend on ptrace. It's already
        # installed by `./.github/actions/setup-cargo-tools` and the
        # locally-verified equivalent command produces the same lcov.
        #
        # We emit BOTH formats from a single test run:
        #   * `lcov.info`     — for Codecov upload (downstream step)
        #   * `cobertura.xml` — for `irongut/CodeCoverageSummary`,
        #                       which renders a PR comment + workflow
        #                       badge in a GitHub-native format
        # `cargo llvm-cov report` re-uses the profraw produced by the
        # first invocation, so tests aren't executed twice.
        run: |
          cargo llvm-cov --workspace --tests --lcov --output-path lcov.info \
            --ignore-filename-regex '^(examples|benches)/'
          cargo llvm-cov report --cobertura --output-path cobertura.xml \
            --ignore-filename-regex '^(examples|benches)/'
          ls -la lcov.info cobertura.xml

      - name: Append coverage summary to job summary
        # `cargo llvm-cov report --summary-only` reads the profraw files
        # produced by the previous step (cargo-llvm-cov keeps them in
        # `target/llvm-cov-target/profraw/` by default) and emits a
        # per-file table. We surface the TOTAL line at a glance and put
        # the full per-file breakdown one click away in a `<details>`
        # block so the job summary stays scannable.
        if: always()
        run: |
          report=$(cargo llvm-cov report --summary-only \
            --ignore-filename-regex '^(examples|benches)/' 2>&1) || true
          total=$(printf '%s\n' "$report" | awk '/^TOTAL/{print}')

          # Extract the three "Cover" columns from the TOTAL row:
          # Filename | Regions | Missed | Cover | Functions | Missed | Cover | Lines | Missed | Cover | …
          regions_pct=$(printf '%s\n' "$total" | awk '{print $4}')
          functions_pct=$(printf '%s\n' "$total" | awk '{print $7}')
          lines_pct=$(printf '%s\n' "$total" | awk '{print $10}')

          {
            echo "## 📊 Coverage Report"
            echo ""
            echo "| Metric | Coverage |"
            echo "| --- | --- |"
            echo "| Lines | **${lines_pct:-N/A}** |"
            echo "| Functions | ${functions_pct:-N/A} |"
            echo "| Regions | ${regions_pct:-N/A} |"
            echo ""
            echo "Generated with [\`cargo-llvm-cov\`](https://github.com/taiki-e/cargo-llvm-cov);"
            echo "full \`lcov.info\` uploaded to [Codecov](https://app.codecov.io/gh/${GITHUB_REPOSITORY}) below."
            echo ""
            echo "<details><summary><strong>Per-file breakdown</strong></summary>"
            echo ""
            echo '```text'
            printf '%s\n' "$report"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Code Coverage Summary Report
        # Converts the cobertura XML into a GitHub-native markdown
        # report. Posts/updates a sticky PR comment via the action's
        # built-in commenting and writes `code-coverage-results.md`
        # which we also fold into the workflow step summary.
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always() && hashFiles('cobertura.xml') != ''
        with:
          filename: cobertura.xml
          badge: true
          format: markdown
          output: both
          # Thresholds drive the color of the badge / summary header:
          #   <  60% → 🔴
          #   60–80% → 🟡
          #   >  80% → 🟢
          thresholds: "60 80"

      - name: Sticky PR comment with coverage delta
        # Re-uses the markdown that CodeCoverageSummary just wrote to
        # `code-coverage-results.md` and posts it as a single replaced
        # PR comment instead of accumulating new ones per push.
        # `@v3` is on Node.js 24 (the deprecated `@v2` still uses
        # Node.js 20, which the runner started flagging in late 2025).
        uses: marocchino/sticky-pull-request-comment@v3
        if: github.event_name == 'pull_request' && hashFiles('code-coverage-results.md') != ''
        with:
          recreate: true
          path: code-coverage-results.md
          header: coverage-report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./lcov.info
          fail_ci_if_error: false
          verbose: true
          name: rust-yaml-coverage
          flags: unittests

  security_audit:
    name: Security Audit
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    timeout-minutes: 6
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]') }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CLIENT_ID }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Use PR head SHA on pull_request events to avoid synthetic merge commit
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: "0"
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token || github.token }}
          submodules: true

      - name: GitHub Actions Bot Setup
        uses: ./.github/actions/bot-setup

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cargo tools cache
        uses: ./.github/actions/setup-cargo-tools
        with:
          tools: "cargo-audit cargo-deny"

      - name: Run security audit
        run: cargo audit

      - name: Check dependencies with cargo-deny
        run: cargo deny check

  dependency_check:
    name: Dependency Check
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    timeout-minutes: 20
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]') }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CLIENT_ID }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Use PR head SHA on pull_request events to avoid synthetic merge commit
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: "0"
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token || github.token }}
          submodules: true

      - name: GitHub Actions Bot Setup
        uses: ./.github/actions/bot-setup

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cargo tools cache
        uses: ./.github/actions/setup-cargo-tools
        with:
          tools: "cargo-outdated cargo-edit cargo-udeps"

      - name: Check outdated dependencies
        run: |
          echo "## Checking for outdated dependencies..."
          cargo outdated || true
          echo "Note: Outdated dependencies are informational only and do not fail the build."

  benchmark:
    name: Benchmark
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    timeout-minutes: 15
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]') }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CLIENT_ID }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Use PR head SHA on pull_request events to avoid synthetic merge commit
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: "0"
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token || github.token }}
          submodules: true

      - name: GitHub Actions Bot Setup
        uses: ./.github/actions/bot-setup

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build for benchmarks
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('src/**/*.rs') }}-${{ hashFiles('benches/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-bench-
            ${{ runner.os }}-cargo-build-stable-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-build-stable-

      - name: Run benchmarks
        run: cargo bench --no-run

  docs:
    name: Documentation
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    timeout-minutes: 6
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CLIENT_ID }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Use PR head SHA on pull_request events to avoid synthetic merge commit
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: "0"
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token || github.token }}
          submodules: true

      - name: GitHub Actions Bot Setup
        uses: ./.github/actions/bot-setup

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build for docs
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('src/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-docs-
            ${{ runner.os }}-cargo-build-stable-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-build-stable-

      - name: Build documentation
        run: cargo doc --all-features --no-deps

      - name: Check for broken links
        run: cargo doc --all-features --no-deps --open

  build:
    if: ${{ success() && !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]') }}
    needs:
      [
        docs,
        benchmark,
        security_audit,
        dependency_check,
        coverage,
        clippy,
        rustfmt,
        test,
        yaml_test_suite,
        version,
      ]
    name: Build
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    timeout-minutes: 20
    env:
      BUILD_OS: ubuntu-latest
      BUILD_ARCH: x86_64
      BUILD_TARGET: x86_64-unknown-linux-gnu
    # Ensure only one build job runs at a time to prevent resource conflicts
    concurrency:
      group: build-ubuntu-latest-x86_64-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CLIENT_ID }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Use PR head SHA on pull_request events to avoid synthetic merge commit
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: "0"
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token || github.token }}
          submodules: true

      - name: GitHub Actions Bot Setup
        uses: ./.github/actions/bot-setup

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.BUILD_TARGET }}

      - name: Cache cargo registry and git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ env.BUILD_OS }}-${{ env.BUILD_ARCH }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ env.BUILD_OS }}-${{ env.BUILD_ARCH }}-cargo-registry-
            ${{ env.BUILD_OS }}-cargo-registry-

      - name: Cache cargo build for cross-platform
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ env.BUILD_OS }}-${{ env.BUILD_ARCH }}-cargo-cross-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('src/**/*.rs') }}
          restore-keys: |
            ${{ env.BUILD_OS }}-${{ env.BUILD_ARCH }}-cargo-cross-${{ hashFiles('**/Cargo.lock') }}-
            ${{ env.BUILD_OS }}-${{ env.BUILD_ARCH }}-cargo-cross-
            ${{ env.BUILD_OS }}-cargo-cross-${{ hashFiles('**/Cargo.lock') }}-
            ${{ env.BUILD_OS }}-cargo-cross-
            ${{ env.BUILD_OS }}-cargo-build-stable-${{ hashFiles('**/Cargo.lock') }}-
            ${{ env.BUILD_OS }}-cargo-build-stable-

      - name: Setup cargo tools cache
        uses: ./.github/actions/setup-cargo-tools
        with:
          tools: "cargo-edit"
          arch: ${{ env.BUILD_ARCH }}

      - name: Set version
        run: cargo set-version ${{ needs.version.outputs.version }}

      - name: Tag
        id: tag
        shell: bash -l {0}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          #!/usr/bin/env bash

          function tagger() {
            VERSION=$1
            echo "Releasing Version: ${VERSION}"
            TAG_EXISTS=$(git ls-remote -q --tags | grep -q "refs/tags/${VERSION}$" && echo true || echo false)
            if [[ "${TAG_EXISTS}" = true ]];
            then
              HAS_RELEASE=$(gh release list --json tagName -q '.[].tagName' | grep -E "^(${VERSION})$" && echo true || echo false)
              if [[ "${HAS_RELEASE}" == true ]];
              then
                gh release delete --yes ${VERSION}
              fi
              git push origin --delete ${VERSION}
              git tag -d ${VERSION}
            fi

            echo
            git tag -a ${VERSION} -m "chore: Release Version ${VERSION} [skip ci]"
            git push -f --tags --follow-tags
            git push --set-upstream origin ${{ github.ref_name }}
            echo
            echo
          }

          tagger "v${{ needs.version.outputs.version }}"
          if [[ "${{ github.ref_name  }}" == "${{ github.event.repository.default_branch }}" ]];
          then
            tagger "v${{ needs.version.outputs.major }}.${{ needs.version.outputs.minor }}"
            tagger "v${{ needs.version.outputs.major }}"
          fi

      - name: Build
        run: cargo build --target ${{ env.BUILD_TARGET }} --release --verbose

      - name: Run tests
        run: cargo test --target ${{ env.BUILD_TARGET }} --verbose

      - name: GitHub Actions Release
        id: release
        shell: bash -l {0}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          #!/usr/bin/env bash

          if [[ "${{ github.ref_name  }}" == "${{ github.event.repository.default_branch }}" ]];
          then
            gh release list | grep Draft | awk '{print $1 " \t"}' | while read -r draft; do echo "Removing Draft Releases: ${draft}"; gh release delete --yes "${draft}"; done
            gh release create v${{ needs.version.outputs.version }} --generate-notes --verify-tag --latest
          fi
