name: Linter

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  pre-commit:
    name: Pre-Commit
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    env:
      # Auto-trust the repo's mise.toml so the markdown-format-check hook's
      # `mise run check-markdown` works non-interactively in CI (mise refuses
      # untrusted config files by default).
      MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CLIENT_ID }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Use PR head SHA on pull_request events to avoid synthetic merge commit
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: "0"
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token || github.token }}
          submodules: true

      - name: GitHub Actions Bot Setup
        uses: ./.github/actions/bot-setup

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ vars.PYTHON_VERSION || '3.13' }}

      - uses: jdx/mise-action@v4
        with:
          cache_key: "mise-{{platform}}-{{version}}-{{file_hash}}"
          github_token: ${{ github.token }}

      - name: Cache pre-commit hooks
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py${{ vars.PYTHON_VERSION || '3.13' }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-py${{ vars.PYTHON_VERSION || '3.13' }}-
            pre-commit-${{ runner.os }}-

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Pre-Commit Check
        run: pre-commit run --show-diff-on-failure --color=always --all-files

  committed:
    name: Commit Message Lint (committed)
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    timeout-minutes: 5
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CLIENT_ID }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: "0"

      - name: GitHub Actions Bot Setup
        uses: ./.github/actions/bot-setup

      - name: Install committed
        uses: taiki-e/install-action@v2
        with:
          tool: committed

      - name: Validate current commit (push)
        if: github.event_name == 'push'
        run: committed HEAD~1..HEAD --no-merge-commit --verbose

      - name: Validate PR commits (pull_request)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          committed "${BASE_SHA}..${HEAD_SHA}" --no-merge-commit --verbose

      - name: Comment on PR with results
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        with:
          script: |
            const { owner, repo, number } = context.issue;
            const baseSha = process.env.BASE_SHA;

            const comment = `## 📝 Commit Message Validation Failed

            Your commit messages don't follow our [Conventional Commits](https://www.conventionalcommits.org/) format. Validation is enforced by [\`committed\`](https://github.com/crate-ci/committed) (Rust-native) using rules defined in [\`committed.toml\`](committed.toml).

            ### Expected Format:
            \`\`\`
            <type>(<scope>)?!?: <description>

            [optional body]

            [optional footer]
            \`\`\`

            ### Examples:
            - \`feat(parser): add support for complex mapping keys\`
            - \`fix(emitter): resolve string quoting for version numbers\`
            - \`docs: update installation instructions\`
            - \`test(scanner): add edge case tests for indentation\`
            - \`feat(api)!: drop legacy endpoint\` *(breaking change)*

            ### Valid Types:
            \`init\`, \`build\`, \`ci\`, \`chore\`, \`docs\`, \`feat\`, \`fix\`, \`perf\`, \`refactor\`, \`release\`, \`revert\`, \`style\`, \`test\`

            (Mirrors \`GitVersion.yml\`'s \`major-version-bump-message\` type set, plus \`init\` for the bootstrap commit. Append \`!\` after the type/scope to mark a breaking change.)

            ### Reproduce locally:
            \`\`\`sh
            cargo install committed   # or: cargo binstall committed
            committed ${baseSha}..HEAD --verbose
            \`\`\`

            ### Special markers (parsed by tooling, not by \`committed\`):
            - **Semver control**: \`+semver: major|minor|patch|none\` (GitVersion)
            - **CI control**: \`[skip ci]\` / \`[ci skip]\`
            - **Breaking changes**: footer \`BREAKING CHANGE: <description>\` or \`!\` after type

            Please fix your commit messages and force-push to update this PR. See the [commit message template](.gitmessage) for full guidance.`;

            github.rest.issues.createComment({
              owner,
              repo,
              issue_number: number,
              body: comment
            });
